name: Build Workspace Uploader APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Grab the files from your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Extract the project files handling spaces and parentheses safely
      - name: Unzip Workspace Uploader Project
        run: |
          if [ -f "workspace-uploader (1).zip" ]; then
            unzip "workspace-uploader (1).zip" -d workspace-uploader
          elif [ -f "Workspace-uploader (1).zip" ]; then
            unzip "Workspace-uploader (1).zip" -d workspace-uploader
          elif [ -f "workspace-uploader/workspace-uploader (1).zip" ]; then
            unzip "workspace-uploader/workspace-uploader (1).zip" -d workspace-uploader
          elif [ -f "workspace-uploader.zip" ]; then
            unzip workspace-uploader.zip -d workspace-uploader
          else
            echo "Error: Could not find workspace-uploader (1).zip"
            exit 1
          fi

      # Step 3: Set up Java environment
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 4: Load Gradle execution systems
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Step 5: Construct the missing Gradle wrapper setup
      - name: Generate missing Gradle Wrapper
        run: |
          cd workspace-uploader
          if [ ! -f "build.gradle" ] && [ ! -f "build.gradle.kts" ]; then
            SUBDIR=$(find . -maxdepth 2 -name "build.gradle" -o -name "build.gradle.kts" | head -n 1 | cut -d'/' -f2)
            if [ ! -z "$SUBDIR" ] && [ "$SUBDIR" != "." ]; then cd $SUBDIR; fi
          fi
          gradle wrapper
          chmod +x gradlew

      # Step 6: Generate the mandatory test keystore for signing
      - name: Generate Debug Keystore
        run: |
          cd workspace-uploader
          if [ ! -f "build.gradle" ] && [ ! -f "build.gradle.kts" ]; then
            SUBDIR=$(find . -maxdepth 2 -name "build.gradle" -o -name "build.gradle.kts" | head -n 1 | cut -d'/' -f2)
            if [ ! -z "$SUBDIR" ] && [ "$SUBDIR" != "." ]; then cd $SUBDIR; fi
          fi
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"

      # Step 7: Compile and assemble the app binary
      - name: Build with Gradle
        run: |
          cd workspace-uploader
          if [ ! -f "build.gradle" ] && [ ! -f "build.gradle.kts" ]; then
            SUBDIR=$(find . -maxdepth 2 -name "build.gradle" -o -name "build.gradle.kts" | head -n 1 | cut -d'/' -f2)
            if [ ! -z "$SUBDIR" ] && [ "$SUBDIR" != "." ]; then cd $SUBDIR; fi
          fi
          ./gradlew assembleDebug --stacktrace

      # Step 8: Expose the resulting installation file
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: workspace-uploader-apk
          path: workspace-uploader/**/build/outputs/apk/debug/*.apk
